<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash AI Bot</title>
    <style>
        /* --- CSS ডিজাইন --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: transparent; }

        .chat-container {
            width: 100%; height: 100vh; background: #fff;
            display: flex; flex-direction: column; overflow: hidden;
            border-radius: 15px; border: 1px solid #ddd;
        }

        /* হেডার */
        .header {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: #fff; padding: 12px 15px; display: flex; align-items: center; gap: 10px;
        }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
        .info { display: flex; flex-direction: column; }
        .name { font-weight: bold; font-size: 15px; }
        .status { font-size: 11px; opacity: 0.9; }

        /* চ্যাট বক্স */
        #display { flex: 1; padding: 15px; overflow-y: auto; background: #fdfdfd; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 14px; max-width: 85%; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .user { background: #6e8efb; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #f1f3f5; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* ইনপুট এরিয়া */
        .footer { display: flex; padding: 12px; border-top: 1px solid #eee; background: #fff; align-items: center; }
        #input { flex: 1; border: none; background: #f1f3f5; padding: 10px; border-radius: 10px; outline: none; font-size: 14px; }
        #send-btn { background: none; border: none; color: #6e8efb; font-size: 22px; cursor: pointer; margin-left: 10px; transition: 0.2s; }
        #send-btn:hover { color: #a777e3; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <img src="https://writestylesonline.com/wp-content/uploads/2016/08/Follow-These-Steps-for-a-Flawless-Professional-Profile-Picture-1024x1024.jpg" class="profile-img">
            <div class="info">
                <span class="name">আকাশ</span>
                <span class="status">Online (Premium AI)</span>
            </div>
        </div>

        <div id="display">
            <div class="msg ai">আসসালামু আলাইকুম! আমি আকাশ। আমাদের প্রিমিয়াম ডিল পেতে সাইটে একটি একাউন্ট করুন। কীভাবে সাহায্য করতে পারি?</div>
        </div>

        <div class="footer">
            <input type="text" id="input" placeholder="আপনার প্রশ্নটি লিখুন..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button id="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        // আপনার Gemini API Key এখানে বসান
        const API_KEY = "AIzaSyBqP0wq2R8I9KCm9wD-zJ0u8R9DL3r889c9"; 

        async function sendMsg() {
            const input = document.getElementById('input');
            const display = document.getElementById('display');
            const userText = input.value.trim();

            if (!userText) return;

            // ইউজারের মেসেজ দেখানো
            display.innerHTML += `<div class="msg user">${userText}</div>`;
            input.value = "";
            display.scrollTop = display.scrollHeight;

            // লোডিং দেখানো
            const loaderId = "loader-" + Date.now();
            display.innerHTML += `<div class="msg ai" id="${loaderId}">আকাশ ভাবছে...</div>`;
            display.scrollTop = display.scrollHeight;

            try {
                // AI-কে দেওয়া সিস্টেম প্রম্পট (ইমো ও টেলিগ্রাম)
                const systemPrompt = `
                তুমি আকাশ। ১. সংক্ষেপে উত্তর দাও। 
                ২. ইউজারকে সাইটে একাউন্ট করতে উৎসাহিত করো। 
                ৩. সরাসরি সাহায্যের জন্য আমাদের ইমো (Imo) এবং টেলিগ্রাম (Telegram) এ যোগাযোগ করতে বলো। 
                ৪. কোনোভাবেই হোয়াটসঅ্যাপের কথা বলবে না।
                ইউজারের প্রশ্ন: ${userText}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt }] }]
                    })
                });

                const data = await response.json();
                const aiReply = data.candidates[0].content.parts[0].text;
                
                // উত্তর আপডেট
                document.getElementById(loaderId).innerText = aiReply;
            } catch (error) {
                document.getElementById(loaderId).innerText = "দুঃখিত, এখন উত্তর দিতে পারছি না। আবার চেষ্টা করুন।";
            }
            display.scrollTop = display.scrollHeight;
        }
    </script>
</body>
</html>
