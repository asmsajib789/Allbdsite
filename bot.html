<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash AI Bot</title>
    <style>
        /* --- CSS ডিজাইন --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff; height: 100vh; display: flex; flex-direction: column; }

        /* হেডার */
        .header {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: #fff; padding: 12px 15px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .profile-img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
        .info .name { font-weight: bold; font-size: 15px; display: block; }
        .info .status { font-size: 11px; opacity: 0.9; }

        /* চ্যাট এরিয়া */
        #display { flex: 1; padding: 15px; overflow-y: auto; background: #f8f9fa; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 14px; max-width: 85%; line-height: 1.5; word-wrap: break-word; position: relative; }
        .user { background: #6e8efb; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* ইনপুট এরিয়া */
        .footer { display: flex; padding: 12px; border-top: 1px solid #eee; background: #fff; align-items: center; }
        #input { flex: 1; border: none; background: #f1f3f5; padding: 10px 15px; border-radius: 20px; outline: none; font-size: 14px; }
        #send-btn { background: none; border: none; color: #6e8efb; font-size: 24px; cursor: pointer; margin-left: 10px; transition: 0.2s; }
        #send-btn:hover { color: #a777e3; transform: scale(1.1); }

        /* স্ক্রলবার হাইড (ঐচ্ছিক) */
        #display::-webkit-scrollbar { width: 5px; }
        #display::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://writestylesonline.com/wp-content/uploads/2016/08/Follow-These-Steps-for-a-Flawless-Professional-Profile-Picture-1024x1024.jpg" class="profile-img">
        <div class="info">
            <span class="name">আকাশ</span>
            <span class="status">অনলাইনে আছে (Premium AI)</span>
        </div>
    </div>

    <div id="display">
        <div class="msg ai">আসসালামু আলাইকুম! আমি আকাশ। আমাদের প্রিমিয়াম সার্ভিস পেতে সাইটে একটি একাউন্ট করুন। কীভাবে সাহায্য করতে পারি?</div>
    </div>

    <div class="footer">
        <input type="text" id="input" placeholder="আপনার প্রশ্নটি লিখুন..." autocomplete="off">
        <button id="send-btn">➤</button>
    </div>

    <script>
        /* --- কনফিগারেশন --- */
        // নিচে আপনার Gemini API Key টি কোটেশনের ভেতরে বসান
        const API_KEY = "AIzaSyDwpCyreR4F6dEf0PvzsPGVxhkHdIdxxwc"; 

        const input = document.getElementById('input');
        const display = document.getElementById('display');
        const btn = document.getElementById('send-btn');

        async function sendMsg() {
            const userText = input.value.trim();
            if (!userText) return;

            // ১. ইউজারের মেসেজ স্ক্রিনে দেখানো
            display.innerHTML += `<div class="msg user">${userText}</div>`;
            input.value = "";
            display.scrollTop = display.scrollHeight;

            // ২. লোডিং ইফেক্ট দেখানো
            const loaderId = "loader-" + Date.now();
            display.innerHTML += `<div class="msg ai" id="${loaderId}">আকাশ ভাবছে...</div>`;
            display.scrollTop = display.scrollHeight;

            try {
                // ৩. গুগল জেমিনি এপিআই কল (লেটেস্ট ১.৫ ফ্ল্যাশ মডেল)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ 
                                text: `তুমি আকাশ। সংক্ষেপে বাংলা উত্তর দাও। ১. ইউজারকে সাইটে একাউন্ট করতে উৎসাহিত করো। ২. সরাসরি সাহায্যের জন্য ইমো (Imo) এবং টেলিগ্রাম (Telegram) এ যোগাযোগ করতে বলো। ৩. কোনোভাবেই হোয়াটসঅ্যাপের কথা বলবে না। ইউজারের প্রশ্ন: ${userText}` 
                            }] 
                        }]
                    })
                });

                const data = await response.json();
                
                // ৪. রেসপন্স চেক করা
                if (data.candidates && data.candidates[0].content) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    document.getElementById(loaderId).innerText = aiReply;
                } else {
                    console.error("API Error Details:", data);
                    document.getElementById(loaderId).innerText = "দুঃখিত, এআই এখন সাড়া দিচ্ছে না। দয়া করে কিছুক্ষণ পর চেষ্টা করুন।";
                }
            } catch (error) {
                console.error("Connection Error:", error);
                document.getElementById(loaderId).innerText = "সার্ভারের সাথে কানেক্ট হতে সমস্যা হচ্ছে। দয়া করে ইন্টারনেট কানেকশন বা API Key চেক করুন।";
            }
            display.scrollTop = display.scrollHeight;
        }

        // বাটন ক্লিক এবং এন্টার কী হ্যান্ডেলার
        btn.addEventListener('click', sendMsg);
        input.addEventListener('keypress', (e) => { 
            if(e.key === 'Enter') sendMsg(); 
        });
    </script>
</body>
</html>
